<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
<rect width="100%" height="100%" fill="#0f172a"/>
<rect x="40" y="36" width="900" height="448" rx="18" fill="#020617" stroke="#334155"/>
<circle cx="72" cy="68" r="8" fill="#ef4444"/>
<circle cx="100" cy="68" r="8" fill="#f59e0b"/>
<circle cx="128" cy="68" r="8" fill="#22c55e"/>
<text x="72" y="112" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#38bdf8">$ dotnet run --project TextAnalysisTool/TextAnalysisTool.csproj</text>
<text x="72" y="142" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0"></text>
<text x="72" y="172" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">--- Text Analysis Tool ---</text>
<text x="72" y="202" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">1. Display total number of unique words</text>
<text x="72" y="232" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">2. Display all words in alphabetical order</text>
<text x="72" y="262" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">3. Display the longest word</text>
<text x="72" y="292" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">4. Display the most frequent word</text>
<text x="72" y="322" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">5. Search for a word</text>
<text x="72" y="352" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0"></text>
<text x="72" y="382" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#38bdf8">&gt; 5</text>
<text x="72" y="412" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">Enter word to search: world</text>
<text x="72" y="442" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e2e8f0">'world' found 2 time(s) on lines: 2, 3</text>
</svg>
